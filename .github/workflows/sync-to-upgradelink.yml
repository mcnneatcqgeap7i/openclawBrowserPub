name: Sync Release to UpgradeLink

on:
  workflow_dispatch:
    inputs:
      version:
        description: '版本号 (如 v1.0.0)'
        required: true
        type: string
      prompt:
        description: '升级提示内容'
        required: false
        type: string
        default: '发现新版本，是否立即更新？'

jobs:
  upgradeLink-upload:
    permissions:
       contents: read
    runs-on: ubuntu-latest
    steps:
      - name: Debug Secrets
        run: |
          echo "AccessKey length: ${#ACCESS_KEY}"   # 仅打印长度，不暴露内容
          echo "ElectronKey length: ${#ELECTRON_KEY}"
        env:
          ACCESS_KEY: ${{ secrets.UPGRADE_LINK_ACCESS_KEY }}
          ELECTRON_KEY: ${{ secrets.UPGRADE_LINK_ELECTRON_KEY }}
      - name: Send request to UpgradeLink
        uses: toolsetlink/upgradelink-action-electron@v1.0.1   # 使用真实存在的版本标签
        with:
          source-url: 'https://github.com/${{ github.repository }}/releases/download/${{ inputs.version }}'
          access-key: ${{ secrets.UPGRADE_LINK_ACCESS_KEY }}
          electron-key: ${{ secrets.UPGRADE_LINK_ELECTRON_KEY }}
          github-token: ${{ secrets.GITHUB_TOKEN }}
          version: ${{ inputs.version }}
          prompt-upgrade-content: ${{ inputs.prompt }}
