name: Sync Release to UpgradeLink

on:
  workflow_dispatch:
    inputs:
      version:
        description: '版本号 (如 v1.0.0)'
        required: true
        type: string
      prompt:
        description: '升级提示内容'
        required: false
        type: string
        default: '发现新版本，是否立即更新？'

jobs:
  upgradeLink-upload:
    runs-on: ubuntu-latest
    steps:
      # 这个调试步骤现在可以移除或注释掉，因为它只是为了定位问题的
      # - name: Direct API Test (Debug)
      #   run: |
      #     echo "Testing UpgradeLink API credentials..."
      #     HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" \
      #       -H "x-api-key: ${{ secrets.UPGRADE_LINK_ACCESS_KEY }}" \
      #       "https://api.upgrade.toolsetlink.com/v1/electron/github-aciton/upload?electronKey=${{ secrets.UPGRADE_LINK_ELECTRON_KEY }}&githubToken=${{ secrets.GITHUB_TOKEN }}")
      #     echo "API returned HTTP $HTTP_CODE"
      #     ...

      - name: Send request to UpgradeLink
        uses: toolsetlink/upgradelink-action-electron@v1.0.1
        with:
          # 注意：这里不需要也不应该添加 /latest.yml，Action 会自行处理
          source-url: 'https://github.com/${{ github.repository }}/releases/download/${{ inputs.version }}'
          access-key: ${{ secrets.UPGRADE_LINK_ACCESS_KEY }} # ★ 确保这个 Key 来自 UpgradeLink 后台的 Key Management 页面
          electron-key: ${{ secrets.UPGRADE_LINK_ELECTRON_KEY }} # ★ 确保这个 Key 是 Electron 应用的唯一标识
          github-token: ${{ secrets.GITHUB_TOKEN }}
          prompt-upgrade-content: ${{ inputs.prompt }}
